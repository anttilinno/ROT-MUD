  [[rooms.exits]]
  direction = "north"
  to_vnum = 9650

[[rooms]]
vnum = 9658
name = "The Palace Gate"
sector = "city"
description = """
You stand before a magnificantly crafted gate wrought in solid gold. You
gape in awe at the splendor of the spiraling towers beyond the portal. The
ruler of all the eastern lands resides in this fine palace, and he is not
a poor man. The grand entrance lies byond the gate, and Sultan's walk is
to the east."""

  [[rooms.exits]]
  direction = "east"
  to_vnum = 9520

  [[rooms.exits]]
