[[rooms]]
vnum = 1222
name = "Eriana's Grove"
sector = "inside"
description = """
You have stumbled into a peaceful, fragrant grove surrounded by deep forest,
and carpeted in thick, lush grass. A waterfall cascades from a rock ledge to
the north, and empties into a quiet pool in which many rainbow-colored fish
feed.  Next to the pool a massive weeping willow trails its long, sinuous
fingers in the water. Large iridescent-blue fruit hang heavily from a
silver-barked tree nestled in boulders. Sunlight streams through the thick
anopy of trees, spilling across the low, comfortable grass hassocks scattered
about.  Exotic flowers of all shapes and sizes color the grove and send rich
perfume wafting throughout, while many-colored butterflies dance among them.
A variety of wide-eyed rabbits, deer, and other creatures move about, watching
you inquisitively, yet unafraid.

    At the far end of the grove is a large, oddly-grown tree trunk.
    You notice a banner suspended in the air as if by magic."""

  [[rooms.exits]]
  direction = "north"
  to_vnum = 1210

