[[help]]
keywords = ["avian"]
description = """
AVIAN - The Winged Ones

Avians are humanoids with large, feathered wings. They are wise
and perceptive, with a natural ability to fly.

Size: Large
Creation Points: 5

Stats:    Base  Max
  STR     12    17
  INT     14    19
  WIS     15    20
  DEX     11    16
  CON     12    17

Bonus Skills: None (natural flight)

Avians make good clerics and druids.
"""
see_also = ["races"]

[[help]]
keywords = ["gnome"]
description = """
GNOME - Tinkerers and Illusionists

Gnomes are small, clever folk with a natural affinity for magic,
particularly illusions. They are curious and inventive.

Size: Small
Creation Points: 4

Stats:    Base  Max
  STR     11    16
  INT     15    20
  WIS     14    19
  DEX     12    15
  CON     12    15

Bonus Skills: None

Gnomes make excellent mages.
"""
see_also = ["races"]

[[help]]
keywords = ["draconian"]
description = """
DRACONIAN - Dragon-Blooded

