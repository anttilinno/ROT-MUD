# Race help entries

[[help]]
keywords = ["races", "race"]
description = """
Rivers of Time features 18 playable races, each with unique attributes
and abilities. Races affect your starting stats, maximum stats, size,
and sometimes grant bonus skills.

STANDARD RACES (0-5 creation points):
  Human    - Balanced, no bonuses or penalties
  Half-Elf - Slightly better than human
  Elf      - High DEX/INT, low STR/CON, bonus sneak/hide
  Halfling - High DEX, low STR, bonus sneak/hide
  Gnome    - High INT, small size
  Goblin   - Quick and sneaky, bonus sneak/hide

STRONG RACES (6-8 creation points):
  Dwarf    - High STR/CON, low DEX, bonus berserk
  Giant    - Very high STR, low INT/DEX, bonus bash
  Half-Orc - High STR/CON, low INT/WIS
  Pixie    - Tiny, high INT/DEX, fragile
  Avian    - Winged, high WIS
  Gnoll    - Savage hunters
  Satyr    - Forest dwellers

POWERFUL RACES (9+ creation points):
  Centaur  - Horse-bodied, bonus enhanced damage
  Minotaur - Bull-headed, bonus enhanced damage
  Draconian - Dragon-blooded, bonus fast healing
  Titan    - Near-giant, bonus fast healing
  Heucuva  - Undead, bonus second attack
  Kenku    - Bird-folk, bonus meditation

Use 'help <racename>' for details on each race.
"""
see_also = ["classes", "score"]

[[help]]
keywords = ["human"]
description = """
HUMAN - The Adaptable Race

Humans are the most common and versatile race. They have no special
bonuses or penalties, making them suitable for any class.

Size: Medium
Creation Points: 0

Stats:    Base  Max
  STR     13    18
  INT     13    18
  WIS     13    18
  DEX     13    18
  CON     13    18

Bonus Skills: None

Humans excel at any class equally, making them ideal for new players.
"""
see_also = ["races"]

[[help]]
keywords = ["elf"]
description = """
ELF - The Fair Folk

Elves are graceful, long-lived beings with an affinity for magic and
nature. They are agile and intelligent but physically frail.

Size: Small
Creation Points: 5

Stats:    Base  Max
  STR     12    16
  INT     14    20
  WIS     13    18
  DEX     15    21
  CON     11    15

Bonus Skills: sneak, hide

Elves make excellent mages, thieves, and rangers.
"""
see_also = ["races", "halfelf"]

[[help]]
keywords = ["dwarf"]
description = """
DWARF - Mountain Folk

Dwarves are stout, tough, and stubborn. They are skilled craftsmen
and fierce warriors, with a legendary resistance to magic.

Size: Medium
Creation Points: 8

Stats:    Base  Max
  STR     14    20
  INT     12    16
  WIS     13    19
  DEX     11    15
  CON     15    21

Bonus Skills: berserk

Dwarves make excellent warriors and clerics.
"""
see_also = ["races"]

[[help]]
keywords = ["giant"]
description = """
GIANT - The Towering Ones

Giants are massive humanoids of tremendous strength. What they lack
in intelligence they make up for in raw physical power.

Size: Large
Creation Points: 6

Stats:    Base  Max
  STR     16    22
  INT     11    15
  WIS     13    18
  DEX     11    15
  CON     14    20

Bonus Skills: bash, fast healing

Giants make excellent warriors but struggle with magic.
"""
see_also = ["races", "titan"]

[[help]]
keywords = ["pixie"]
description = """
PIXIE - Tiny Fey Creatures

Pixies are minuscule winged beings with powerful magical abilities.
Despite their small size, they wield impressive arcane power.

Size: Tiny
Creation Points: 6

Stats:    Base  Max
  STR     10    14
  INT     15    21
  WIS     15    21
  DEX     15    20
  CON     10    14

Bonus Skills: None

Pixies make excellent mages but are very fragile.
"""
see_also = ["races"]

[[help]]
keywords = ["halfling"]
description = """
HALFLING - The Little Folk

Halflings are small, nimble folk known for their stealth and luck.
They make excellent thieves and surprisingly good adventurers.

Size: Small
Creation Points: 5

Stats:    Base  Max
  STR     11    15
  INT     14    20
  WIS     12    16
  DEX     15    21
  CON     13    18

Bonus Skills: sneak, hide

Halflings excel as thieves and make decent rogues.
"""
see_also = ["races"]

[[help]]
keywords = ["halforc", "half-orc"]
description = """
HALF-ORC - Children of Two Worlds

Half-orcs combine human adaptability with orcish strength and
toughness. They are often fierce warriors.

Size: Medium
Creation Points: 6

Stats:    Base  Max
  STR     14    19
  INT     11    15
  WIS     11    15
  DEX     14    20
  CON     15    21

Bonus Skills: fast healing

Half-orcs make excellent warriors and decent thieves.
"""
see_also = ["races"]

[[help]]
keywords = ["goblin"]
description = """
GOBLIN - Cunning Survivors

Goblins are small, crafty creatures who survive through stealth
and cunning rather than strength.

Size: Small
Creation Points: 5

Stats:    Base  Max
  STR     11    16
  INT     14    20
  WIS     12    16
  DEX     15    19
  CON     14    20

Bonus Skills: sneak, hide

Goblins make good thieves.
"""
see_also = ["races"]

[[help]]
keywords = ["halfelf", "half-elf"]
description = """
HALF-ELF - Between Two Worlds

Half-elves combine human adaptability with elven grace. They are
well-rounded and adaptable, slightly better than humans.

Size: Medium
Creation Points: 2

Stats:    Base  Max
  STR     12    17
  INT     13    18
  WIS     14    19
  DEX     13    18
  CON     13    18

Bonus Skills: None

Half-elves are slightly better than humans at most things.
"""
