[tools]
go = "1.23"

[tasks.build]
description = "Build the ROT MUD server"
dir = "go"
run = "go build -o rotmud ./cmd/rotmud"

[tasks.dev]
description = "Build and run the ROT MUD server"
dir = "go"
run = "go build -o rotmud ./cmd/rotmud && ./rotmud"

[tasks.test]
description = "Run all tests"
dir = "go"
run = "go test ./..."

[tasks.clean]
description = "Clean build artifacts"
dir = "go"
run = "rm -f rotmud && go clean"

[tasks.areconv]
description = "Build the area converter tool"
dir = "go"
run = "go build -o areaconv ./cmd/areconv"

[tasks.convert-areas]
description = "Convert all ROM areas to TOML format"
depends = ["areconv"]
dir = "go"
run = "./areaconv --all ../C/rot/area ./data/areas"

[tasks.repomap]
description = "Generate repo map via aider --show-repo-map (LLM context)"
run = "uvx --quiet --python 3.12 --from aider-chat aider --show-repo-map --map-tokens 4096 --exit"
